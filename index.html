.header{background:linear-gradient(135deg,#0d1b2a,#1a3a5c,#0277bd);border-radius:20px;padding:16px 20px;margin-bottom:10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:0 8px 32px rgba(2,119,189,.4);border:1px solid rgba(255,255,255,.08);position:relative;overflow:hidden}

.tabs{display:flex;gap:4px;flex-wrap:wrap;background:#0d1b2a;border-radius:16px 16px 0 0;padding:8px 8px 0}
.tab-btn{padding:10px 14px;border:none;border-radius:12px 12px 0 0;font-weight:700;font-size:12px;position:relative;transition:all .2s;cursor:pointer;letter-spacing:.3px}

/* TAB CONTENT */
.tab-content{background:#fff;border-radius:0 16px 16px 16px;padding:18px;box-shadow:0 8px 32px rgba(0,0,0,.2)}

/* STAT CARDS */
.stat-card{border-radius:16px;padding:14px 10px;text-align:center;position:relative;overflow:hidden;cursor:default;transition:transform .2s,box-shadow .2s}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.stat-card::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.06)}

/* PRODUCT CARDS */
.prod-card{border-radius:14px;cursor:pointer;position:relative;overflow:hidden;transition:all .22s;border:2px solid transparent;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.prod-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.15)}
.prod-card:active{transform:scale(.96)}
.prod-img{width:100%;height:90px;object-fit:cover;display:block;background:#f0f4ff}
.prod-img-placeholder{width:100%;height:90px;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,#f0f4ff,#e8eeff)}

/* CART */
.cart-item{background:#fff;border-radius:14px;padding:12px;margin-bottom:8px;border:2px solid #e8eeff;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:all .2s}
.cart-item:hover{border-color:#0277bd44;box-shadow:0 4px 14px rgba(2,119,189,.12)}

/* INPUTS */
.inp{padding:10px 14px;border-radius:10px;border:1.5px solid #e0e0e0;width:100%;font-size:14px;font-family:'Tajawal',Arial;background:#fff;color:#333;transition:border-color .2s,box-shadow .2s}
.inp:focus{outline:none;border-color:#0277bd;box-shadow:0 0 0 3px rgba(2,119,189,.12)}
.btn{border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;color:#fff;font-family:'Tajawal',Arial;cursor:pointer;transition:all .18s}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn:active{transform:scale(.97)}

/* SECTION BOX */
.section-box{border-radius:14px;padding:16px;margin-bottom:16px}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{padding:10px 8px;text-align:center;font-size:12px}
td{padding:8px 5px;text-align:center;font-size:12px;border:1px solid #eee}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:14px;font-weight:700;z-index:9999;box-shadow:0 6px 24px rgba(0,0,0,.35);font-size:15px;color:#fff;display:none;animation:slideDown .3s ease}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* MOBILE */
@media(max-width:700px){
  .home-grid{display:block!important}
  .cart-sidebar{position:fixed!important;bottom:0;left:0;right:0;height:auto!important;max-height:88vh;overflow-y:auto;border-radius:24px 24px 0 0!important;z-index:1000;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 -8px 32px rgba(0,0,0,.3)}
  .cart-sidebar.open{transform:translateY(0)!important}
  .cart-fab{display:flex!important}
  .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:none;backdrop-filter:blur(2px)}
  .cart-overlay.open{display:block!important}
  .cat-grid{grid-template-columns:repeat(5,1fr)!important}
}
@media(min-width:701px){.cart-fab{display:none!important}}

/* LOW BADGE */
.low-badge{background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700}
</style>

function mFlixyProfit(){return S.flixy.filter(function(f){var d=new Date(f.date);return d.getMonth()===nm()&&d.getFullYear()===ny();}).reduce(function(a,f){return a+(f.profit||0);},0);}
function mPT(){return S.pjobs.filter(function(p){var d=new Date(p.date);return d.getMonth()===nm()&&d.getFullYear()===ny();}).reduce(function(a,p){return a+p.price;},0);}
function mET(){return S.expenses.filter(function(e){var d=new Date(e.date);return d.getMonth()===nm()&&d.getFullYear()===ny();}).reduce(function(a,e){return a+e.amount;},0);}

function bindCartEvents(refreshFn){
  document.querySelectorAll('[data-rem]').forEach(function(btn){btn.onclick=function(){remFromCart(+btn.dataset.rem);save();refreshFn();};});
  document.querySelectorAll('[data-inc]').forEach(function(btn){btn.onclick=function(){changeCartQty(+btn.dataset.inc,1);save();refreshFn();};});
  document.querySelectorAll('[data-dec]').forEach(function(btn){btn.onclick=function(){changeCartQty(+btn.dataset.dec,-1);save();refreshFn();};});
  document.querySelectorAll('[data-price]').forEach(function(inp){inp.oninput=function(){updateCartItemPrice(+inp.dataset.price,+inp.value);refreshFn();};});
  document.querySelectorAll('[data-disc]').forEach(function(btn){btn.onclick=function(){S.disc=+btn.dataset.disc;refreshFn();};});
  var payBtn=document.getElementById('payBtn');if(payBtn)payBtn.onclick=function(){saveSale(null);};
  var clrBtn=document.getElementById('clrCartBtn');if(clrBtn)clrBtn.onclick=function(){clrCart();refreshFn();};
  var printBtn=document.getElementById('printBtn');if(printBtn)printBtn.onclick=printReceipt;
  document.querySelectorAll('[data-client]').forEach(function(btn){btn.onclick=function(){if(confirm("على حساب "+btn.dataset.cname+"؟"))saveSale({id:+btn.dataset.client,name:btn.dataset.cname});};});
}

function renderHomeOnly(){if(S.tab!=='home')return;var tc=document.querySelector('.tab-content');if(tc){tc.innerHTML=renderHome()+renderBackup();bindHomeEvents();}}
function bindHomeEvents(){
  var camBtn=document.getElementById('camBtn');if(camBtn)camBtn.onclick=openCamera;
  document.querySelectorAll('[data-transfer]').forEach(function(btn){btn.onclick=function(){var id=+btn.dataset.transfer;var qty=parseInt((document.getElementById('tq_'+id)||{}).value)||0;transferToShop(id,qty);};});
  bindCartEvents(renderHomeOnly);
}

    '</div>'+
    '<button onclick="addStock()" class="btn" style="background:linear-gradient(135deg,#0277bd,#01579b);width:100%;margin-top:12px;font-size:15px;padding:12px;box-shadow:0 4px 14px rgba(2,119,189,.35)">➕ إضافة / تحديث</button>'+
  '</div>';

        '<td><input type="number" value="'+s.c+'" onchange="var it=S.stock.find(function(x){return x.id==='+s.id+'});if(it&&it.p>+this.value){it.c=+this.value;save();}else{this.value=it?it.c:this.value;}" style="width:62px;padding:4px;border-radius:6px;border:1.5px solid #aaa;text-align:center;font-size:12px;font-family:Tajawal,Arial"></td>'+
        (showBC?'<td style="font-size:10px;color:#666;font-family:monospace">'+(s.barcode||'—')+'</td>':'')+

      '</tr>';

      '<div onclick="S.openCats[\''+cat+'\']=!S.openCats[\''+cat+'\'];render()" style="background:linear-gradient(135deg,'+CC[cat]+','+CC[cat]+'cc);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;cursor:pointer">'+
        '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+

    {ic:"📱",l:"Flixy",v:fmt(rFR)+" دج",c:"#1a237e",g:"linear-gradient(135deg,#1a237e,#3949ab)"},
    {ic:"💸",l:"مصاريف",v:fmt(rE)+" دج",c:"#bf360c",g:"linear-gradient(135deg,#bf360c,#e64a19)"},
    {ic:"🏆",l:"صافي الربح",v:fmt(rNet)+" دج",c:rNet>=0?"#1b5e20":"#b71c1c",g:rNet>=0?"linear-gradient(135deg,#1b5e20,#43a047)":"linear-gradient(135deg,#b71c1c,#e53935)"}
  ];
  var salesList=rs.slice().reverse().map(function(s,idx){
    return'<div style="border:1.5px solid #e8eeff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.06)">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:4px">'+
        '<span style="background:linear-gradient(135deg,#0277bd,#01579b);color:#fff;border-radius:9px;padding:3px 10px;font-size:14px;font-weight:700">#'+(rs.length-idx)+(s.client?' • '+esc(s.client.name):'')+'</span>'+
        '<div style="display:flex;gap:8px;align-items:center"><span style="color:#aaa;font-size:12px">'+ld(s.date)+'</span><button onclick="if(confirm(\'إلغاء؟\'))cancelSale('+s.id+')" style="background:#fff0f0;color:#f44336;border:1.5px solid #ffcdd2;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:700">↩️ إلغاء</button></div>'+
      '</div>'+
      s.items.map(function(it){return'<div style="border-bottom:1px dashed #eee;display:flex;justify-content:space-between;padding:5px 0;font-size:13px"><span style="color:#555">'+esc(it.n)+' × '+it.q+'</span><span style="font-weight:700;color:#0277bd">'+it.sum+' دج</span></div>';}).join('')+
      '<div style="display:flex;justify-content:space-between;margin-top:8px;font-weight:800;flex-wrap:wrap;gap:4px">'+
        (s.discount>0?'<span style="color:#e65100;font-size:13px">🏷️ خصم '+s.discount+'% − '+s.discAmt+' دج</span>':'')+
        '<span style="color:#0277bd;font-size:15px">'+s.total+' دج</span>'+
        '<span style="background:#e8f5e9;color:#2e7d32;border-radius:8px;padding:2px 10px;font-size:14px">ربح: +'+s.profit+' دج</span>'+
      '</div>'+
    '</div>';
  }).join('');
  return'<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;justify-content:space-between"><div style="display:flex;gap:6px;flex-wrap:wrap">'+repBtns+'</div>'+csvBtns+'</div>'+
    '<div class="grid2" style="margin-bottom:18px">'+
      summCards.map(function(c){
        return'<div style="background:'+c.g+';border-radius:14px;padding:16px;display:flex;gap:12px;align-items:center;box-shadow:0 4px 14px '+c.c+'44">'+
          '<span style="font-size:28px">'+c.ic+'</span>'+
          '<div><div style="color:rgba(255,255,255,.75);font-size:12px;font-weight:600">'+c.l+'</div><div style="color:#fff;font-size:18px;font-weight:900">'+c.v+'</div></div>'+
        '</div>';
      }).join('')+
    '</div>'+
    '<div style="background:linear-gradient(135deg,'+(rNet>=0?'#1b5e20,#2e7d32':'#b71c1c,#c62828')+');border-radius:16px;padding:18px;text-align:center;margin-bottom:18px;box-shadow:0 6px 20px '+(rNet>=0?'rgba(27,94,32,.4)':'rgba(183,28,28,.4)')+'">'+
      '<div style="color:rgba(255,255,255,.75);font-size:14px;font-weight:600;margin-bottom:4px">صافي الربح</div>'+
      '<div style="color:#fff;font-size:30px;font-weight:900">'+(rNet>=0?'📈':'📉')+' '+fmt(rNet)+' دج</div>'+
    '</div>'+
    (rs.length===0?'<div style="text-align:center;padding:30px;color:#aaa"><div style="font-size:40px;margin-bottom:10px">📊</div><div>لا توجد مبيعات</div></div>':salesList);
}

// ===== BACKUP =====
function renderBackup(){
  return'<div style="margin-top:24px;padding:16px 18px;background:linear-gradient(135deg,#f8f9fa,#f0f4ff);border-radius:14px;border:1.5px solid #e8eeff;box-shadow:0 2px 10px rgba(0,0,0,.05)">'+
    '<div style="font-weight:800;color:#1a2535;font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px">💾 <span>النسخ الاحتياطي والمزامنة</span></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
      '<button onclick="expBk()" class="btn" style="background:linear-gradient(135deg,#0277bd,#01579b);font-size:13px;box-shadow:0 3px 10px rgba(2,119,189,.3)">⬇️ تصدير نسخة</button>'+
      '<button onclick="document.getElementById(\'impFile\').click()" class="btn" style="background:linear-gradient(135deg,#1b5e20,#2e7d32);font-size:13px;box-shadow:0 3px 10px rgba(27,94,32,.3)">⬆️ استيراد نسخة</button>'+
      '<button onclick="startSync()" class="btn" style="background:linear-gradient(135deg,#4a148c,#6a1b9a);font-size:13px;box-shadow:0 3px 10px rgba(74,20,140,.3)">☁️ مزامنة السحابة</button>'+
      '<input type="file" id="impFile" accept=".json" style="display:none" onchange="impBk(this.files[0]);this.value=\'\'">'+
    '</div>'+
    '<div id="syncStatus" style="margin-top:8px;font-size:12px;color:#666"></div>'+
  '</div>';
}

// ===== MAIN RENDER =====
function render(){
  var tabContent='';
  if(S.tab==="home")tabContent=renderHome();
  else if(S.tab==="stock")tabContent=renderStock();
  else if(S.tab==="print")tabContent=renderPrint();
  else if(S.tab==="flixy")tabContent=renderFlixy();
  else if(S.tab==="clients")tabContent=renderClients();
  else if(S.tab==="expenses")tabContent=renderExpenses();
  else if(S.tab==="report")tabContent=renderReport();
  document.getElementById('root').innerHTML='<div class="app">'+renderHeader()+'<div class="tab-content">'+tabContent+renderBackup()+'</div></div>';
  if(!clockTimer){clockTimer=setInterval(function(){var c=document.getElementById('clockLbl');var d=document.getElementById('dateLbl');if(c)c.textContent=clockStr();if(d)d.textContent=dateStr();},1000);}
  if(S.tab==="home")bindHomeEvents();
  if(S.tab==="flixy")bindFlixyEvents();
}

try{render();}catch(e){
  document.getElementById('root').innerHTML='<div style="background:linear-gradient(135deg,#c62828,#e53935);color:#fff;padding:24px;font-size:15px;font-family:Tajawal,Arial;border-radius:16px;margin:20px;direction:rtl;box-shadow:0 8px 24px rgba(198,40,40,.4)"><h2 style="margin-bottom:10px">⚠️ خطأ</h2><p>'+e.message+'</p><pre style="font-size:11px;overflow:auto;white-space:pre-wrap;margin-top:12px;opacity:.8">'+(e.stack||'')+'</pre></div>';
}
</script></body></html>
