var camStream=null;var camDetector=null;var camLoop=null;var scanCooldown=false;var lastScanned="";
function openCamera(){
  if(!('BarcodeDetector' in window)){showCamUnsupported();return;}
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){toast("الكاميرا غير متاحة","e");return;}
  var ov=document.getElementById('camModal');
  if(!ov){ov=document.createElement('div');ov.id='camModal';ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);z-index:5000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:16px';document.body.appendChild(ov);}
  ov.innerHTML='<div style="color:#29b6f6;font-size:20px;font-weight:bold">مسح الباركود</div>'+
    '<div style="position:relative;width:100%;max-width:480px"><video id="camVideo" autoplay playsinline style="width:100%;border-radius:14px;border:3px solid #29b6f6;display:block"></video>'+
    '<div style="position:absolute;top:50%;left:50%;width:220px;height:100px;margin-top:-50px;margin-left:-110px;border:3px solid #69f0ae;border-radius:8px;pointer-events:none"></div></div>'+
    '<div id="camStatus" style="color:#b3e5fc;font-size:15px;font-weight:bold">جاري تشغيل الكاميرا...</div>'+
    '<div id="camResult" style="min-height:36px;text-align:center"></div>'+
    '<button id="camCloseBtn" style="background:#f44336;color:#fff;border:none;border-radius:12px;padding:13px 36px;font-size:16px;font-weight:bold;cursor:pointer;font-family:Arial">✕ إغلاق</button>';
  ov.style.display='flex';
  document.getElementById('camCloseBtn').onclick=closeCamera;
  scanCooldown=false;lastScanned="";
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false})
  .then(function(stream){
    camStream=stream;var video=document.getElementById('camVideo');video.srcObject=stream;
    document.getElementById('camStatus').textContent='وجّه الكاميرا نحو الباركود';
    camDetector=new BarcodeDetector({formats:['ean_13','ean_8','code_128','code_39','qr_code','upc_a','upc_e']});
    camLoop=setInterval(function(){
      if(scanCooldown)return;if(!video.readyState||video.readyState<2)return;
      camDetector.detect(video).then(function(barcodes){
        if(!barcodes||!barcodes.length)return;var code=barcodes[0].rawValue;
        if(code===lastScanned)return;lastScanned=code;scanCooldown=true;
        var item=S.stock.find(function(s){return s.barcode===code;});
        var resEl=document.getElementById('camResult');
        if(!item){beep(false);closeCamera();setTimeout(function(){openQuickAdd(code);},200);return;}
        if(item.q<=0){beep(false);if(resEl)resEl.innerHTML='<span style="background:#e65100;color:#fff;border-radius:10px;padding:8px 18px;font-size:14px;font-weight:bold">نفذ: '+esc(item.n)+'</span>';setTimeout(function(){scanCooldown=false;lastScanned="";},2000);return;}
        beep(true);if(resEl)resEl.innerHTML='<span style="background:#1b5e20;color:#fff;border-radius:10px;padding:8px 18px;font-size:15px;font-weight:bold">'+esc(item.n)+' — '+item.p+' دج</span>';
        addToCartSilent(item.id);setTimeout(function(){closeCamera();S.tab='home';render();toast("أضيف: "+item.n);},1200);
      }).catch(function(){});
    },300);
  }).catch(function(err){
    var msg='لا يمكن الوصول للكاميرا';
    if(err.name==='NotAllowedError')msg='اضغط السماح للكاميرا';
    else if(err.name==='NotFoundError')msg='لا توجد كاميرا';
    var st=document.getElementById('camStatus');if(st)st.textContent=msg;toast(msg,"e");
  });
}
function closeCamera(){clearInterval(camLoop);camLoop=null;if(camStream){camStream.getTracks().forEach(function(t){t.stop();});camStream=null;}var ov=document.getElementById('camModal');if(ov)ov.style.display='none';scanCooldown=false;lastScanned="";}

  '</div>';
  ov.style.display='flex';

    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">'+
      '<input id="qa_p" class="inp" type="number" placeholder="سعر البيع (دج) *" style="border-color:#0277bd">'+
      '<input id="qa_c" class="inp" type="number" placeholder="سعر الشراء (دج) *">'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">'+
      '<input id="qa_q" class="inp" type="number" placeholder="كمية المحل">'+
      '<input id="qa_wq" class="inp" type="number" placeholder="كمية المستودع">'+
    '</div>'+
    '<div style="display:flex;gap:8px">'+
      '<button id="qa_save" style="flex:1;background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:bold;cursor:pointer;font-family:Arial">حفظ وإضافة للسلة</button>'+
      '<button id="qa_cancel" style="background:#f0f0f0;color:#555;border:none;border-radius:10px;padding:13px 16px;font-size:14px;font-weight:bold;cursor:pointer;font-family:Arial">إلغاء</button>'+
    '</div></div>';
  ov.style.display='flex';
  document.getElementById('qa_cancel').onclick=function(){ov.style.display='none';};
  document.getElementById('qa_save').onclick=function(){
    var n=(document.getElementById('qa_n').value||'').trim();
    var p=parseFloat(document.getElementById('qa_p').value)||0;
    var c=parseFloat(document.getElementById('qa_c').value)||0;
    var cat=document.getElementById('qa_cat').value;
    var q=parseInt(document.getElementById('qa_q').value)||0;
    var wq=parseInt(document.getElementById('qa_wq').value)||0;
    if(!n){toast("أدخل اسم المنتج","e");return;}
    if(!p){toast("أدخل سعر البيع","e");return;}

function bindCartEvents(refreshFn){
  document.querySelectorAll('[data-rem]').forEach(function(btn){btn.onclick=function(){remFromCart(+btn.dataset.rem);save();refreshFn();};});
  document.querySelectorAll('[data-inc]').forEach(function(btn){btn.onclick=function(){changeCartQty(+btn.dataset.inc,1);save();refreshFn();};});
  document.querySelectorAll('[data-dec]').forEach(function(btn){btn.onclick=function(){changeCartQty(+btn.dataset.dec,-1);save();refreshFn();};});
  document.querySelectorAll('[data-price]').forEach(function(inp){inp.oninput=function(){updateCartItemPrice(+inp.dataset.price,+inp.value);refreshFn();};});
  document.querySelectorAll('[data-disc]').forEach(function(btn){btn.onclick=function(){S.disc=+btn.dataset.disc;refreshFn();};});
  var payBtn=document.getElementById('payBtn');if(payBtn)payBtn.onclick=function(){saveSale(null);};
  var clrBtn=document.getElementById('clrCartBtn');if(clrBtn)clrBtn.onclick=function(){clrCart();refreshFn();};
  var printBtn=document.getElementById('printBtn');if(printBtn)printBtn.onclick=printReceipt;
  document.querySelectorAll('[data-client]').forEach(function(btn){btn.onclick=function(){if(confirm("على حساب "+btn.dataset.cname+"؟"))saveSale({id:+btn.dataset.client,name:btn.dataset.cname});};});
}

function bindFlixyEvents(){
  if(S.tab!=="flixy")return;

  });
  [{op:"Idoom 500",price:500},{op:"Idoom 1000",price:1000},{op:"Idoom 2000",price:2000}].forEach(function(x){
    var btn=document.getElementById("idb"+x.price);if(btn){btn.onclick=function(){addFlixy(x.op,x.price);};}

}

}

function renderExpenses(){
  var list=S.expenses.slice().reverse().map(function(e){return '<div style="border:1px solid #e0e0e0;border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px"><div><span style="font-weight:bold;color:#bf360c;font-size:15px">'+esc(e.label)+'</span><span style="background:#bf360c22;color:#bf360c;border-radius:10px;padding:2px 8px;font-size:12px;margin-right:6px">'+e.cat+'</span><div style="font-size:12px;color:#666;margin-top:2px">'+ldo(e.date)+'</div></div><div style="display:flex;gap:8px;align-items:center"><span style="font-weight:bold;color:#bf360c;font-size:17px">'+fmt(e.amount)+' دج</span><button onclick="delExp('+e.id+')" style="background:#f44336;color:#fff;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px">🗑</button></div></div>';}).join('');
  return '<div class="section-box" style="background:#fff8e1"><h4 style="margin:0 0 12px;color:#bf360c;font-size:16px">تسجيل مصروف</h4>'+
    '<div class="grid2"><input class="inp" value="'+esc(S.eForm.lbl)+'" oninput="S.eForm.lbl=this.value" placeholder="وصف المصروف"><select class="inp" onchange="S.eForm.cat=this.value">'+ECATS.map(function(c){return '<option value="'+c+'"'+(S.eForm.cat===c?' selected':'')+'>'+c+'</option>';}).join('')+'</select><input class="inp" type="number" value="'+esc(S.eForm.amt)+'" oninput="S.eForm.amt=this.value" placeholder="المبلغ (دج)" style="grid-column:span 2"></div>'+
    '<button onclick="addExp()" class="btn" style="background:#bf360c;width:100%;margin-top:10px;font-size:14px">تسجيل المصروف</button></div>'+
    '<div class="grid2" style="margin-bottom:16px"><div style="background:#bf360c11;border:1.5px solid #bf360c33;border-radius:12px;padding:14px;text-align:center"><div style="font-size:13px;color:#666">مصاريف اليوم</div><div style="font-size:22px;font-weight:bold;color:#bf360c">'+fmt(tET())+' دج</div></div><div style="background:#bf360c11;border:1.5px solid #bf360c33;border-radius:12px;padding:14px;text-align:center"><div style="font-size:13px;color:#666">مصاريف الشهر</div><div style="font-size:22px;font-weight:bold;color:#bf360c">'+fmt(mET())+' دج</div></div></div>'+
    (S.expenses.length===0?'<p style="text-align:center;padding:26px;color:#888">لا توجد مصاريف</p>':list);
}

function renderReport(){
  var rs=fSales(),re=fExp(),rp=fPrint();
  var rf=S.flixy.filter(function(f){var d=new Date(f.date);if(S.rep==="today")return dk(d)===tstr();if(S.rep==="week")return(now()-d)<7*86400000;if(S.rep==="month")return d.getMonth()===nm()&&d.getFullYear()===ny();return true;});
  var rT=rs.reduce(function(a,s){return a+s.total;},0);var rP=rs.reduce(function(a,s){return a+s.profit;},0);
  var rPR=rp.reduce(function(a,p){return a+p.price;},0);var rFR=rf.reduce(function(a,f){return a+(f.profit||0);},0);
  var rE=re.reduce(function(a,e){return a+e.amount;},0);var rNet=rP+rPR+rFR-rE;
  var repBtns=[["today","اليوم"],["week","الأسبوع"],["month","الشهر"],["all","الكل"]].map(function(p){return '<button onclick="S.rep=\''+p[0]+'\';render()" class="btn" style="background:'+(S.rep===p[0]?'#0277bd':'#e0e0e0')+';color:'+(S.rep===p[0]?'#fff':'#333')+';padding:8px 16px;font-size:14px">'+p[1]+'</button>';}).join('');
  var csvBtns='<div style="display:flex;gap:5px;flex-wrap:wrap"><button onclick="expCSV(\'sales\')" class="btn" style="background:#1b5e20;padding:7px 12px;font-size:13px">مبيعات CSV</button><button onclick="expCSV(\'exp\')" class="btn" style="background:#bf360c;padding:7px 12px;font-size:13px">مصاريف CSV</button><button onclick="expCSV(\'stock\')" class="btn" style="background:#4a148c;padding:7px 12px;font-size:13px">مخزون CSV</button><button onclick="printReport()" class="btn" style="background:#01579b;padding:7px 12px;font-size:13px">🖨️ طباعة التقرير</button></div>';
  var summCards=[
    {ic:"💰",l:"مبيعات",v:fmt(rT)+" دج",c:"#0277bd"},{ic:"📈",l:"أرباح",v:fmt(rP)+" دج",c:"#1b5e20"},
    {ic:"🖨️",l:"طباعة",v:fmt(rPR)+" دج",c:"#00695c"},{ic:"📱",l:"Flixy",v:fmt(rFR)+" دج",c:"#1a237e"},
    {ic:"💸",l:"مصاريف",v:fmt(rE)+" دج",c:"#bf360c"},{ic:"🏆",l:"صافي الربح",v:fmt(rNet)+" دج",c:rNet>=0?"#1b5e20":"#b71c1c"}
  ];
  var salesList=rs.slice().reverse().map(function(s,idx){return '<div style="border:1px solid #e0e0e0;border-radius:12px;padding:12px 14px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:4px"><span style="font-weight:bold;color:#0277bd;font-size:14px">#'+(rs.length-idx)+(s.client?' • '+esc(s.client.name):'')+'</span><div style="display:flex;gap:8px;align-items:center"><span style="color:#666;font-size:12px">'+ld(s.date)+'</span><button onclick="if(confirm(\'إلغاء؟\'))cancelSale('+s.id+')" style="background:#ff7043;color:#fff;border:none;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:12px">إلغاء</button></div></div>'+s.items.map(function(it){return '<div style="border-bottom:1px dashed #e0e0e0;display:flex;justify-content:space-between;padding:4px 0;font-size:13px"><span>'+esc(it.n)+' × '+it.q+'</span><span style="font-weight:bold">'+it.sum+' دج</span></div>';}).join('')+'<div style="display:flex;justify-content:space-between;margin-top:7px;font-weight:bold;flex-wrap:wrap;gap:4px">'+(s.discount>0?'<span style="color:#e65100;font-size:13px">خصم '+s.discount+'% − '+s.discAmt+' دج</span>':'')+'<span style="color:#2e7d32;font-size:14px">'+s.total+' دج</span><span style="color:#0277bd;font-size:14px">ربح: '+s.profit+' دج</span></div></div>';}).join('');
  return '<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;justify-content:space-between"><div style="display:flex;gap:6px;flex-wrap:wrap">'+repBtns+'</div>'+csvBtns+'</div>'+
    '<div class="grid2" style="margin-bottom:16px">'+summCards.map(function(c){return '<div style="background:'+c.c+'11;border:1.5px solid '+c.c+'33;border-radius:12px;padding:14px;display:flex;gap:10px;align-items:center"><span style="font-size:26px">'+c.ic+'</span><div><div style="color:#666;font-size:12px">'+c.l+'</div><div style="color:'+c.c+';font-size:17px;font-weight:bold">'+c.v+'</div></div></div>';}).join('')+'</div>'+
    (rs.length===0?'<p style="text-align:center;padding:26px;color:#888">لا توجد مبيعات</p>':salesList);
}

function renderBackup(){
  return '<div style="margin-top:24px;padding:14px 16px;background:#f5f5f5;border-radius:12px;border:1.5px solid #e0e0e0">'+
    '<div style="font-weight:bold;color:#455a64;font-size:14px;margin-bottom:10px">💾 النسخ الاحتياطي والمزامنة</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
      '<button onclick="expBk()" class="btn" style="background:#0277bd;font-size:13px">⬇️ تصدير نسخة</button>'+
      '<button onclick="document.getElementById(\'impFile\').click()" class="btn" style="background:#1b5e20;font-size:13px">⬆️ استيراد نسخة</button>'+
      '<button onclick="startSync()" class="btn" style="background:#6a1b9a;font-size:13px">☁️ مزامنة السحابة</button>'+
      '<input type="file" id="impFile" accept=".json" style="display:none" onchange="impBk(this.files[0]);this.value=\'\'">'+
    '</div>'+
    '<div id="syncStatus" style="margin-top:8px;font-size:12px;color:#666"></div>'+
  '</div>';
}

function render(){
  var tabContent='';
  if(S.tab==="home")tabContent=renderHome();
  else if(S.tab==="stock")tabContent=renderStock();
  else if(S.tab==="print")tabContent=renderPrint();
  else if(S.tab==="flixy")tabContent=renderFlixy();
  else if(S.tab==="clients")tabContent=renderClients();
  else if(S.tab==="expenses")tabContent=renderExpenses();
  else if(S.tab==="report")tabContent=renderReport();
  document.getElementById('root').innerHTML='<div class="app">'+renderHeader()+'<div class="tab-content">'+tabContent+renderBackup()+'</div></div>';
  if(!clockTimer){clockTimer=setInterval(function(){var c=document.getElementById('clockLbl');var d=document.getElementById('dateLbl');if(c)c.textContent=clockStr();if(d)d.textContent=dateStr();},1000);}
  if(S.tab==="home")bindHomeEvents();
  if(S.tab==="flixy")bindFlixyEvents();
}

try{render();}catch(e){
  document.getElementById('root').innerHTML='<div style="background:#c62828;color:#fff;padding:20px;font-size:15px;font-family:Arial;border-radius:10px;margin:20px;direction:rtl"><h2>خطأ</h2><p>'+e.message+'</p><pre style="font-size:11px;overflow:auto;white-space:pre-wrap;margin-top:10px">'+(e.stack||'')+'</pre></div>';
}
</script></body></html>
